<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGG - Panel de Control</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <main class="center-viewport">
        <section class="login-card">
            <div class="card-logo">🎉</div>
            <h1>inicio de sesion concretado</h1>
            <h2 id="welcome-user" class="welcome-text">bienvenido </h2>
            
            <button id="btn-logout" class="btn-submit btn-logout">Cerrar Sesión</button>
        </section>
    </main>

    <script>
        const usuarioActivo = localStorage.getItem('usuario_actual_sgg');

        if (!usuarioActivo) {
            window.location.href = 'index.html';
        } else {
            document.getElementById('welcome-user').textContent = `bienvenido "${usuarioActivo}"`;
        }

        document.getElementById('btn-logout').addEventListener('click', () => {
            localStorage.removeItem('usuario_actual_sgg');
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
