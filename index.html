<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de Sesión</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main class="login-container">

        <button id="themeToggle" class="theme-btn" type="button">
            🌙 Tema oscuro
        </button>

        <div id="loginSection">
            <h2>Iniciar Sesión</h2>

            <form id="loginForm">

                <div class="input-group">
                    <label for="username">Usuario</label>
                    <input
                        type="text"
                        id="username"
                        placeholder="Ingrese su usuario"
                        required
                    >
                </div>

                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input
                        type="password"
                        id="password"
                        placeholder="Ingrese su contraseña"
                        required
                    >
                </div>

                <button type="submit">
                    Ingresar
                </button>

            </form>
            <p class="switch-text">¿No tienes cuenta? <a href="#" id="btnIrARegistro">Regístrate aquí</a></p>
        </div>

        <div id="registerSection" class="hidden">
            <h2>Crear Cuenta</h2>

            <form id="registerForm">

                <div class="input-group">
                    <label for="regUsername">Nuevo Usuario</label>
                    <input
                        type="text"
                        id="regUsername"
                        placeholder="Ingrese su nuevo usuario"
                        required
                    >
                </div>

                <div class="input-group">
                    <label for="regPassword">Contraseña</label>
                    <input
                        type="password"
                        id="regPassword"
                        placeholder="Mayús, minús, núm y símbolo"
                        required
                    >
                </div>

                <button type="submit">
                    Registrar Cuenta
                </button>

            </form>
            <p class="switch-text"><a href="#" id="btnIrALogin">← Volver al Inicio de Sesión</a></p>
        </div>

        <div id="mensajeResultado" class="message"></div>

    </main>

    <script src="login.js"></script>

</body>

</html>
