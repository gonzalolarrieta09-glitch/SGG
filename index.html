<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGG - Sistema Color Pro</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="theme-light">

    <header class="header-container">
        <button id="theme-toggle" class="btn-theme-toggle">✨ Cambiar Modo</button>
    </header>

    <main class="center-viewport">
        
        <section id="login-section" class="colorful-card dynamic-fade">
            <div class="card-logo">$$</div>
            <h1>¡Hola de nuevo!</h1>
            <p class="subtitle">Gestiona tus gastos con estilo</p>
            
            <form id="login-form">
                <div class="input-group">
                    <label for="username">Usuario o Correo</label>
                    <input type="text" id="username" required placeholder="tu-correo@gmail.com">
                </div>
                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn-gradient">Ingresar al Sistema</button>
            </form>
            
            <p class="switch-mode-text">¿No tienes cuenta? <a href="#" id="link-to-register">Créala aquí mismo</a></p>
            <div id="error-message" class="alert-box-error" aria-live="politic"></div>
        </section>

        <section id="register-section" class="colorful-card hidden dynamic-fade">
            <div class="card-logo">++</div>
            <h1>Crear Cuenta</h1>
            <p class="subtitle">Únete a la experiencia a todo color</p>
            
            <form id="register-form">
                <div class="input-group">
                    <label for="reg-username">Nombre de Usuario</label>
                    <input type="text" id="reg-username" required placeholder="Tu alias">
                </div>
                <div class="input-group">
                    <label for="reg-email">Correo Electrónico</label>
                    <input type="email" id="reg-email" required placeholder="ejemplo@gmail.com o @yahoo.com">
                </div>
                <div class="input-group">
                    <label for="reg-password">Contraseña</label>
                    <input type="password" id="reg-password" required placeholder="Crea tu clave secreta">
                </div>

                <div class="avatar-picker-section">
                    <label>Elige tu avatar personalizado</label>
                    <input type="text" id="avatar-search" placeholder="🔍 Busca un estilo (gato, robot, ninja...)">
                    <div id="avatar-container" class="scroll-grid"></div>
                    <input type="hidden" id="selected-avatar-url" value="https://api.dicebear.com/7.x/bottts/svg?seed=default">
                </div>

                <button type="submit" class="btn-gradient">Registrarme Ahora</button>
            </form>
            
            <p class="switch-mode-text"><a href="#" id="link-to-login">← Volver a Iniciar Sesión</a></p>
            <div id="reg-error-message" class="alert-box-error" aria-live="politic"></div>
        </section>

    </main>

    <script src="js/login.js"></script>
</body>
</html>
