<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGG - Acceso al Sistema</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <main class="center-viewport">
        
        <section id="login-section" class="login-card">
            <div class="card-logo">$$</div>
            <h1>Sistema de Gestión</h1>
            <p class="subtitle">Ingresa tus credenciales para continuar</p>
            
            <form id="login-form">
                <div class="input-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" required placeholder="Ej: usuario1">
                </div>
                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn-submit">Iniciar Sesión</button>
            </form>
            
            <p class="switch-text">¿No tienes cuenta? <a href="#" id="link-to-register">Regístrate aquí</a></p>
            <div id="error-message" class="alert-error"></div>
        </section>

        <section id="register-section" class="login-card hidden">
            <div class="card-logo">++</div>
            <h1>Crear Cuenta</h1>
            <p class="subtitle">La contraseña requiere: 1 Mayúscula, 1 Número y 1 Carácter</p>
            
            <form id="register-form">
                <div class="input-group">
                    <label for="reg-username">Nombre de Usuario</label>
                    <input type="text" id="reg-username" required placeholder="Tu nuevo usuario">
                </div>
                <div class="input-group">
                    <label for="reg-password">Contraseña</label>
                    <input type="password" id="reg-password" required placeholder="Ej: Clave*2026">
                </div>
                <button type="submit" class="btn-submit">Registrar Cuenta</button>
            </form>
            
            <p class="switch-text"><a href="#" id="link-to-login">← Volver al Inicio de Sesión</a></p>
            <div id="reg-error-message" class="alert-error"></div>
        </section>

    </main>

    <script src="js/login.js"></script>
</body>
</html>
