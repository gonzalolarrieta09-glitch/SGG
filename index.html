<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de Sesión - Proyecto</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <main class="login-container">
        <h2>Iniciar Sesión</h2>
        
        <form id="loginForm">
            <div class="input-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" required autocomplete="username" placeholder="Tu usuario">
            </div>
            
            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" required autocomplete="current-password" placeholder="Tu contraseña">
            </div>
            
            <button type="submit">Conectarse</button>
        </form>
        
        <div id="mensajeResultado" class="message"></div>
    </main>

    <script src="login.js"></script>
</body>
</html>
