<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGG - Dashboard Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="theme-light">

    <div class="theme-wrapper">
        <button id="theme-toggle" class="btn-theme" aria-label="Cambiar modo de color">
            <span class="icon-sun">☀️ Mode</span>
        </button>
    </div>

    <main class="app-container">
        
        <section id="login-section" class="auth-card active animate-fade">
            <div class="brand-header">
                <div class="brand-logo">$$</div>
                <h1>Bienvenido de nuevo</h1>
                <p>Ingresa al Sistema de Gestión de Gastos</p>
            </div>
            
            <form id="login-form">
                <div class="input-wrapper">
                    <label for="username">Usuario o Correo</label>
                    <input type="text" id="username" required placeholder="ejemplo@gmail.com">
                </div>
                <div class="input-wrapper">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn-action">Iniciar Sesión</button>
            </form>
            
            <p class="footer-switch">¿No tienes una cuenta? <a href="#" id="link-to-register">Créala ahora</a></p>
            <div id="error-message" class="toast-error" aria-live="politic"></div>
        </section>

        <section id="register-section" class="auth-card hidden animate-fade">
            <div class="brand-header">
                <div class="brand-logo">++</div>
                <h1>Crear tu cuenta</h1>
                <p>Empieza a controlar tus finanzas de forma pro</p>
            </div>
            
            <form id="register-form">
                <div class="input-wrapper">
                    <label for="reg-username">Nombre de Usuario</label>
                    <input type="text" id="reg-username" required placeholder="Tu alias favorito">
                </div>
                <div class="input-wrapper">
                    <label for="reg-email">Correo Electrónico</label>
                    <input type="email" id="reg-email" required placeholder="tu-correo@gmail.com o @yahoo.com">
                </div>
                <div class="input-wrapper">
                    <label for="reg-password">Contraseña</label>
                    <input type="password" id="reg-password" required placeholder="Mínimo 6 caracteres">
                </div>

                <div class="avatar-picker-box">
                    <label>Personaliza tu foto de perfil</label>
                    <input type="text" id="avatar-search" placeholder="🔍 Buscar estilo (gato, robot, ninja...)">
                    <div id="avatar-container" class="custom-scrollbar"></div>
                    <input type="hidden" id="selected-avatar-url" value="https://api.dicebear.com/7.x/bottts/svg?seed=default">
                </div>

                <button type="submit" class="btn-action">Registrar Cuenta</button>
            </form>
            
            <p class="footer-switch"><a href="#" id="link-to-login">← Volver al Inicio de Sesión</a></p>
            <div id="reg-error-message" class="toast-error" aria-live="politic"></div>
        </section>

    </main>

    <script src="js/login.js"></script>
</body>
</html>
